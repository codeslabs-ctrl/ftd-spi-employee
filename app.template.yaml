# =============================================================================
# App Engine template — ftd-spi-employee
# Copy to app.yaml (gitignored) or run: npm run sync-env
# Deploy: npm run deploy  OR  gcloud app deploy
# =============================================================================

service: ftd-spi-employee
entrypoint: node dist/index.js
runtime: nodejs22
env: standard
instance_class: F4

automatic_scaling:
  max_instances: 10
  min_instances: 1
  max_idle_instances: 1
  min_idle_instances: 1
  target_cpu_utilization: 0.65
  max_concurrent_requests: 40

vpc_access_connector:
  # Format: projects/{project}/locations/{region}/connectors/{name}
  name: ""

env_variables:
  NODE_ENV: production
  PROTOCOL: https
  BODY_PARSER_LIMIT: 1mb
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "60"
  REQUEST_TIMEOUT_MS: "30000"
  JWT_TTL_SECONDS: "43200"
  JWT_ISSUER: ftd-spi-employee
  JWT_PRIVATE_KEY_BASE64: ""
  JWT_PUBLIC_KEY_BASE64: ""
  API_CLIENTS_JSON: "[]"
  PAYLOAD_ENCRYPTION_KEY: ""
  CORS_ORIGINS: ""
  EMPLOYEE_PKG: pkg_management_employee
  POSITION_PKG: pkg_management_position
  COMPANY_PKG: pkg_management_company
  MARITAL_STATUS_PKG: pkg_management_marital_status
  JOB_POST_PKG: pkg_management_job_post
  ORG_UNIT_PKG: pkg_management_org_unit
  PKG_SUCCESS_CODE: FTD-200
  PKG_NORECORDS_CODE: FTD-201
  ORACLE_POOL_TIMEOUT: "300"
  ORACLE_QUEUE_TIMEOUT: "60000"
  ORACLE_CALL_TIMEOUT: "30000"
  DB_VE_CONNECT_STRING: ""
  DB_VE_USER: people_one
  DB_VE_PASSWORD: ""
  DB_VE_POOL_MIN: "1"
  DB_VE_POOL_MAX: "10"
  DB_CO_CONNECT_STRING: ""
  DB_CO_USER: people_one
  DB_CO_PASSWORD: ""
  DB_CO_POOL_MIN: "1"
  DB_CO_POOL_MAX: "10"
