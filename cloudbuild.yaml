# CI/CD: lint + tests (SonarQube gate) -> build -> push -> deploy to Cloud Run
steps:
  - id: test
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        npm ci
        npm run lint
        npm test -- --coverage
        # SonarQube scan hook (requires SONAR_HOST_URL/SONAR_TOKEN substitutions or a
        # sonarqube community builder step configured by the platform team):
        # npx sonar-scanner -Dsonar.host.url=$$SONAR_HOST_URL -Dsonar.login=$$SONAR_TOKEN

  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/apis/ftd-spi-employee:$SHORT_SHA
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/apis/ftd-spi-employee:$SHORT_SHA

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ftd-spi-employee
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/apis/ftd-spi-employee:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --vpc-connector=${_VPC_CONNECTOR}
      - --min-instances=1
      - --concurrency=40
      - --set-secrets=JWT_PRIVATE_KEY_BASE64=jwt-private-key:latest,JWT_PUBLIC_KEY_BASE64=jwt-public-key:latest,DB_VE_PASSWORD=db-ve-password:latest,API_CLIENTS_JSON=api-clients:latest
      - --set-env-vars=DB_VE_CONNECT_STRING=${_DB_VE_CONNECT_STRING},DB_VE_USER=${_DB_VE_USER},DB_VE_POOL_MIN=1,DB_VE_POOL_MAX=10,JWT_TTL_SECONDS=43200,JWT_ISSUER=ftd-spi-employee

substitutions:
  _REGION: us-east1
  _VPC_CONNECTOR: spi-connector
  _DB_VE_CONNECT_STRING: ''
  _DB_VE_USER: ''

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/apis/ftd-spi-employee:$SHORT_SHA
